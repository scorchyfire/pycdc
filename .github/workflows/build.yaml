name: Compile pycdc for Windows & Linux
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    if: github.repository == 'scorchyfire/pycdc'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout pycdc
        uses: actions/checkout@v4
        with:
          path: pycdc

      - name: Install mingw-w64
        run: |
          sudo apt update
          sudo apt install -y mingw-w64

      - name: Compile
        run: >
          cd pycdc

          cmake -DCMAKE_SYSTEM_NAME=Windows
          -DCMAKE_C_COMPILER=i686-w64-mingw32-gcc
          -DCMAKE_CXX_COMPILER=i686-w64-mingw32-g++
          -DCMAKE_FIND_ROOT_PATH=/usr/i686-w64-mingw32
          -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY
          -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY
          -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER
          -DCMAKE_CXX_STANDARD_LIBRARIES="-static-libgcc -static-libstdc++"
          .
          
          make

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pycdc-windows
          path: |
            pycdc/pycdc.exe
            pycdc/pycdas.exe
          if-no-files-found: error

  build-linux-x86_64:
    if: github.repository == 'scorchyfire/pycdc'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout pycdc
        uses: actions/checkout@v4
        with:
          path: pycdc

      - name: Setup latest Alpine Linux x86_64
        uses: jirutka/setup-alpine@v1
        with:
          packages: >
            alpine-sdk
            cmake
            python3
        
      - name: Compile for Linux x86_64       
        run: |
          cd pycdc
          git clean -d -f -x
          sed -i '/target_link_libraries(pycdas pycxx)/c target_link_libraries(pycdas pycxx -static)' CMakeLists.txt
          sed -i '/target_link_libraries(pycdc pycxx)/c target_link_libraries(pycdc pycxx -static)' CMakeLists.txt
          cmake .
          make
          mv pycdc pycdc.x86_64
          mv pycdas pycdas.x86_64
        shell: alpine.sh {0}

      - name: Upload Linux x86_64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pycdc-linux-x86_64
          path: |
            pycdc/pycdc.x86_64
            pycdc/pycdas.x86_64
          if-no-files-found: error

  build-linux-aarch64:
    if: github.repository == 'scorchyfire/pycdc'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout pycdc
        uses: actions/checkout@v4
        with:
          path: pycdc

      - name: Setup latest Alpine Linux aarch64
        uses: jirutka/setup-alpine@v1        
        with:
          arch: aarch64
          packages: >
            alpine-sdk
            cmake
            python3

      - name: Compile for Linux AArch64       
        run: |
          cd pycdc
          git clean -d -f -x
          sed -i '/target_link_libraries(pycdas pycxx)/c target_link_libraries(pycdas pycxx -static)' CMakeLists.txt
          sed -i '/target_link_libraries(pycdc pycxx)/c target_link_libraries(pycdc pycxx -static)' CMakeLists.txt
          cmake .
          make
          mv pycdc pycdc.aarch64
          mv pycdas pycdas.aarch64
        shell: alpine.sh {0}        

      - name: Upload Linux aarch64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pycdc-linux-aarch64
          path: |
            pycdc/pycdc.aarch64
            pycdc/pycdas.aarch64
          if-no-files-found: error

  publish:
    if: github.repository == 'scorchyfire/pycdc' && github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs:
      - build-windows
      - build-linux-x86_64
      - build-linux-aarch64
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: pycdc-windows
          path: dist/windows

      - name: Download Linux x86_64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: pycdc-linux-x86_64
          path: dist/linux-x86_64

      - name: Download Linux aarch64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: pycdc-linux-aarch64
          path: dist/linux-aarch64

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          owner: scorchyfire
          repo: pycdc
          name: Decompyle++ v0.0.${{ github.run_number }}
          tag: v0.0.${{ github.run_number }}
          body: |
            Automated release from workflow run ${{ github.run_number }}.
            Commit: ${{ github.sha }}
          artifacts: "dist/windows/pycdc.exe,dist/windows/pycdas.exe,dist/linux-x86_64/pycdc.x86_64,dist/linux-x86_64/pycdas.x86_64,dist/linux-aarch64/pycdc.aarch64,dist/linux-aarch64/pycdas.aarch64"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          draft: false
